all:
  packages:
    - curl
    - git
    - neovim
    - tmux
    - xclip  # clipboard support in 
    - zsh


ubuntu:
  packages:
    - gnome-tweak-tool  # system tweaks: keyboard re-mapping etc.

  manual:
