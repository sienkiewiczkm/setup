      url: https://github.com/nodesource/distributions
      comment: |-
        curl -sL https://deb.nodesource.com/setup_12.x | sudo -E bash -
        sudo apt-get install -y nodejs

    - alacritty: # terminal emulator
      url: https://github.com/jwilm/alacritty 

    - virtual box
    - virtualenv
    - visual studio code
